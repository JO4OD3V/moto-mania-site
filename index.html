<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moto Mania | Motos e Bikes Elétricas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0A1338;
    --navy:#0F1B4C;
    --navy-light:#1B2C6E;
    --orange:#F5701C;
    --orange-deep:#E8420C;
    --gold:#F5B729;
    --smoke:#F4F2ED;
    --smoke-dim:#C9CDDA;
    --whatsapp:#25D366;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--navy-deep);
    color:var(--smoke);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 800px 500px at 15% 0%, rgba(245,113,28,0.14), transparent 60%),
      radial-gradient(ellipse 700px 600px at 100% 30%, rgba(27,44,110,0.5), transparent 55%);
    pointer-events:none;
    z-index:0;
  }

  .speedlines{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
  .speedlines span{
    position:absolute;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--orange), var(--gold), transparent);
    opacity:0.35;
    border-radius:2px;
    animation:dash 5.5s linear infinite;
  }
  @keyframes dash{
    0%{transform:translateX(-30%);opacity:0;}
    15%{opacity:.4;}
    85%{opacity:.4;}
    100%{transform:translateX(30%);opacity:0;}
  }

  header{
    position:relative;
    z-index:2;
    padding:56px 20px 40px;
    text-align:center;
  }
  .logo-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:22px;
  }
  .logo-wrap img{
    width:min(400px, 82vw);
    animation:rise .8s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(18px) scale(.96);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:700;
    margin-bottom:10px;
  }
  h1{
    font-family:'Anton',sans-serif;
    font-weight:400;
    letter-spacing:.02em;
    font-size:clamp(28px,6vw,46px);
    line-height:1.08;
    color:var(--smoke);
    text-transform:uppercase;
  }
  h1 span{
    background:linear-gradient(90deg, var(--orange), var(--gold));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .subhead{
    margin-top:14px;
    color:var(--smoke-dim);
    font-size:15px;
    max-width:480px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.55;
  }

  main{
    position:relative;
    z-index:2;
    max-width:960px;
    margin:0 auto;
    padding:10px 18px 80px;
  }

  .stores{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
    gap:20px;
  }

  .store-card{
    background:linear-gradient(180deg, rgba(27,44,110,0.55), rgba(15,27,76,0.55));
    border:1px solid rgba(245,183,41,0.16);
    border-radius:18px;
    padding:24px 22px 20px;
    position:relative;
    backdrop-filter:blur(6px);
    transition:border-color .25s ease, transform .35s cubic-bezier(.2,.8,.2,1), opacity .6s ease, box-shadow .25s ease;
    opacity:0;
    transform:translateY(24px);
    will-change:transform;
  }
  .store-card.in-view{
    opacity:1;
    transform:translateY(0);
  }
  .store-card:hover{
    border-color:rgba(245,113,28,0.55);
    box-shadow:0 18px 40px -14px rgba(0,0,0,0.55);
  }

  /* barra de progresso de rolagem */
  #scroll-progress{
    position:fixed;
    top:0;left:0;
    height:3px;
    width:0%;
    background:linear-gradient(90deg, var(--orange), var(--gold));
    z-index:50;
    transition:width .1s linear;
  }

  /* ripple de clique */
  .vendor-btn{position:relative; overflow:hidden;}
  .ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(37,211,102,0.45);
    transform:scale(0);
    animation:ripple-anim .55s ease-out forwards;
    pointer-events:none;
  }
  @keyframes ripple-anim{
    to{transform:scale(1); opacity:0;}
  }
  .store-city{
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:700;
    margin-bottom:2px;
  }
  .store-name-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    cursor:pointer;
    margin-bottom:6px;
    user-select:none;
  }
  .store-name{
    font-family:'Anton',sans-serif;
    font-weight:400;
    font-size:22px;
    text-transform:uppercase;
    letter-spacing:.01em;
    color:var(--smoke);
  }
  .chevron{
    width:20px;height:20px;
    flex-shrink:0;
    transition:transform .3s ease;
    color:var(--gold);
  }
  .store-card.open .chevron{
    transform:rotate(180deg);
  }

  .location-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12.5px;
    color:var(--smoke-dim);
    text-decoration:none;
    margin-bottom:16px;
    padding:4px 0;
    transition:color .2s ease;
  }
  .location-link:hover{
    color:var(--gold);
  }
  .location-link svg{
    width:14px;height:14px;
    flex-shrink:0;
    fill:currentColor;
  }

  .vendor-list-wrap{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .4s cubic-bezier(.2,.8,.2,1);
  }
  .store-card.open .vendor-list-wrap{
    grid-template-rows:1fr;
  }
  .vendor-list-inner{
    overflow:hidden;
  }

  /* botao flutuante - lei de transito */
  #law-fab{
    position:fixed;
    right:20px;
    bottom:20px;
    z-index:40;
    display:flex;
    align-items:center;
    gap:8px;
    background:linear-gradient(135deg, var(--navy-light), var(--navy));
    border:1px solid rgba(245,183,41,0.4);
    color:var(--smoke);
    padding:13px 18px;
    border-radius:999px;
    box-shadow:0 10px 30px -8px rgba(0,0,0,0.6);
    cursor:pointer;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:.02em;
    transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    animation:fab-pulse 2.6s ease-in-out infinite;
  }
  #law-fab:hover{
    transform:translateY(-3px);
    border-color:var(--gold);
    box-shadow:0 16px 36px -8px rgba(0,0,0,0.7);
  }
  #law-fab svg{
    width:18px;height:18px;
    fill:var(--gold);
    flex-shrink:0;
  }
  @keyframes fab-pulse{
    0%,100%{box-shadow:0 10px 30px -8px rgba(0,0,0,0.6), 0 0 0 0 rgba(245,183,41,0.35);}
    50%{box-shadow:0 10px 30px -8px rgba(0,0,0,0.6), 0 0 0 8px rgba(245,183,41,0);}
  }

  #law-overlay{
    position:fixed;
    inset:0;
    background:rgba(6,10,30,0.72);
    backdrop-filter:blur(3px);
    z-index:60;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  #law-overlay.show{
    opacity:1;
    pointer-events:auto;
  }
  #law-panel{
    background:linear-gradient(180deg, var(--navy-light), var(--navy-deep));
    border:1px solid rgba(245,183,41,0.3);
    border-bottom:none;
    border-radius:22px 22px 0 0;
    max-width:640px;
    width:100%;
    max-height:82vh;
    overflow-y:auto;
    padding:26px 26px 34px;
    transform:translateY(30px);
    transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  #law-overlay.show #law-panel{
    transform:translateY(0);
  }
  #law-panel h2{
    font-family:'Anton',sans-serif;
    font-weight:400;
    font-size:22px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
    padding-right:30px;
  }
  #law-panel p{
    font-size:14px;
    line-height:1.7;
    color:var(--smoke-dim);
  }
  #law-close{
    position:absolute;
    top:20px;
    right:22px;
    background:rgba(244,242,237,0.08);
    border:1px solid rgba(244,242,237,0.15);
    color:var(--smoke);
    width:32px;height:32px;
    border-radius:50%;
    cursor:pointer;
    font-size:16px;
    line-height:1;
  }
  #law-panel{position:relative;}

  .vendor-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .vendor-btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:rgba(244,242,237,0.04);
    border:1px solid rgba(244,242,237,0.10);
    border-radius:12px;
    padding:12px 14px;
    text-decoration:none;
    color:var(--smoke);
    transition:background .2s ease, border-color .2s ease, transform .15s ease;
  }
  .vendor-btn:hover{
    background:rgba(37,211,102,0.10);
    border-color:rgba(37,211,102,0.45);
    transform:translateX(2px);
  }
  .vendor-btn:active{transform:scale(.98);}
  .vendor-info{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }
  .vendor-avatar{
    width:34px;height:34px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--orange), var(--orange-deep));
    display:flex;align-items:center;justify-content:center;
    font-family:'Anton',sans-serif;
    font-size:15px;
    color:#fff;
    flex-shrink:0;
  }
  .vendor-name{
    font-size:14.5px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .vendor-flag{
    display:block;
    font-size:11px;
    color:var(--gold);
    font-weight:600;
    margin-top:1px;
  }
  .wa-icon{
    width:20px;height:20px;
    flex-shrink:0;
    fill:var(--whatsapp);
  }

  footer{
    position:relative;
    z-index:2;
    text-align:center;
    padding:30px 18px 46px;
    color:var(--smoke-dim);
    font-size:12.5px;
    letter-spacing:.02em;
  }

  @media (max-width:480px){
    header{padding:44px 16px 30px;}
  }
</style>
</head>

<script>
const LAW_TEXT = "A Resolução CONTRAN nº 996/2023 dispõe sobre a circulação de ciclomotores, bicicletas elétricas e equipamentos de mobilidade individual autopropelidos em via pública. Considera-se bicicleta elétrica aquela com potência máxima de 350W, velocidade limitada a 25 km/h e equipada com pedal assistido, sendo proibido o uso de acelerador. Veículos com potência ou velocidade superiores, ou com acelerador, são equiparados a ciclomotores, exigindo registro, licenciamento, capacete e habilitação compatível. Equipamentos de mobilidade individual autopropelidos, como patinetes elétricos, devem ter até 1000W de potência, largura máxima de 70 cm e velocidade de até 32 km/h, conforme regulamentação dos órgãos de trânsito. O descumprimento das disposições sujeita o condutor às penalidades previstas no Código de Trânsito Brasileiro.";
document.getElementById('law-text').textContent = LAW_TEXT;

const lawFab = document.getElementById('law-fab');
const lawOverlay = document.getElementById('law-overlay');
const lawClose = document.getElementById('law-close');

lawFab.addEventListener('click', () => lawOverlay.classList.add('show'));
lawClose.addEventListener('click', () => lawOverlay.classList.remove('show'));
lawOverlay.addEventListener('click', (e) => {
  if (e.target === lawOverlay) lawOverlay.classList.remove('show');
});
</script>

<script>
const STORES = [
  {
    city: "Campina Grande",
    name: "Loja Centro",
    address: "Moto Mania Centro, Campina Grande, PB",
    vendors: [
      { name: "Jonas", phone: "5583981968997" },
      { name: "Wellyngton", phone: "558399149347" },
      { name: "Fabrício", phone: "5583987431313" },
      { name: "Marcelo", phone: "5583989041968" }
      { name: "Ryan", phone: "5583981410704" }
    ]
  },
  {
    city: "Campina Grande",
    name: "Loja Santa Cruz",
    address: "Moto Mania Santa Cruz, Campina Grande, PB",
    vendors: [
      { name: "Leidiane", phone: "5583998338087" },
    ]
  },
  {
    city: "Campina Grande",
    name: "Loja Catolé",
    address: "Moto Mania Catolé, Campina Grande, PB",
    vendors: [
      { name: "Thiago", phone: "5583993786093" }
    ]
  },
  {
    city: "Cuité",
    name: "Unidade Cuité",
    address: "Moto Mania, Cuité, PB",
    vendors: [
      { name: "Paulo", phone: "5583996443829" }
    ]
  },
  {
    city: "Esperança",
    name: "Loja Antenor Navarro",
    address: "Moto Mania, Rua Antenor Navarro, Esperança, PB",
    vendors: [
      { name: "Val", phone: "5583991084700" }
    ]
  }
];

function whatsappMessageFor(vendorName){
  return `Olá, ${vendorName}! Vim pelo site da Moto Mania e quero saber mais sobre as motos e bikes elétricas.`;
}

const storesEl = document.getElementById('stores');

STORES.forEach(store => {
  const card = document.createElement('div');
  card.className = 'store-card';

  const vendorsHtml = store.vendors.map(v => {
    const initial = v.name.charAt(0).toUpperCase();
    return `
      <a class="vendor-btn"
         href="#"
         data-phone="${v.phone}"
         data-vendor="${v.name}"
         data-store="${store.name}">
        <span class="vendor-info">
          <span class="vendor-avatar">${initial}</span>
          <span>
            <span class="vendor-name">${v.name}</span>
          </span>
        </span>
        <svg class="wa-icon" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.004 2C6.486 2 2 6.486 2 12.004c0 1.858.51 3.6 1.397 5.09L2 22l4.995-1.379a9.96 9.96 0 0 0 5.009 1.35H12c5.518 0 10.004-4.486 10.004-10.004S17.522 2 12.004 2zm0 18.062a8.03 8.03 0 0 1-4.24-1.209l-.304-.181-3.045.841.815-2.968-.198-.315a8.03 8.03 0 0 1-1.234-4.226c0-4.437 3.61-8.047 8.047-8.047 4.436 0 8.046 3.61 8.046 8.047 0 4.436-3.61 8.058-8.047 8.058z"/></svg>
      </a>`;
  }).join('');

  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(store.address)}`;

  card.innerHTML = `
    <div class="store-city">${store.city}</div>
    <div class="store-name-row" data-toggle>
      <div class="store-name">${store.name}</div>
      <svg class="chevron" viewBox="0 0 24 24"><path fill="currentColor" d="M12 15.5 5 8.5l1.4-1.4L12 12.7l5.6-5.6L19 8.5z"/></svg>
    </div>
    <a class="location-link" href="${mapsUrl}" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24"><path d="M12 2C7.6 2 4 5.6 4 10c0 5.4 7 12 8 12s8-6.6 8-12c0-4.4-3.6-8-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
      Ver localização no mapa
    </a>
    <div class="vendor-list-wrap">
      <div class="vendor-list-inner">
        <div class="vendor-list">${vendorsHtml}</div>
      </div>
    </div>
  `;
  storesEl.appendChild(card);
});

document.addEventListener('click', function(e){
  const toggle = e.target.closest('[data-toggle]');
  if (toggle) {
    toggle.closest('.store-card').classList.toggle('open');
    return;
  }

  const btn = e.target.closest('.vendor-btn');
  if(!btn) return;
  e.preventDefault();

  // efeito ripple
  const rect = btn.getBoundingClientRect();
  const ripple = document.createElement('span');
  const size = Math.max(rect.width, rect.height) * 1.4;
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());

  const phone = btn.getAttribute('data-phone');
  const vendor = btn.getAttribute('data-vendor');
  const store = btn.getAttribute('data-store');
  const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(whatsappMessageFor(vendor))}`;

  if (typeof fbq === 'function') {
    fbq('track', 'Contact', {
      content_name: vendor,
      content_category: store
    });
  }

  window.open(waUrl, '_blank', 'noopener,noreferrer');
});

/* revelar cards ao rolar a tela */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('in-view');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.15 });
document.querySelectorAll('.store-card').forEach((card, i) => {
  card.style.transitionDelay = (i * 60) + 'ms';
  revealObserver.observe(card);
});

/* barra de progresso de rolagem */
const progressBar = document.getElementById('scroll-progress');
function updateProgress(){
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  progressBar.style.width = pct + '%';
}
window.addEventListener('scroll', updateProgress, { passive: true });
updateProgress();

/* leve tilt 3D nos cards ao passar o mouse (desktop) */
if (window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
  document.querySelectorAll('.store-card').forEach(card => {
    card.addEventListener('mousemove', (e) => {
      const r = card.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width - 0.5;
      const py = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform = `translateY(-2px) perspective(600px) rotateX(${py * -4}deg) rotateY(${px * 4}deg)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  });
}

const sl = document.getElementById('speedlines');
for(let i=0;i<7;i++){
  const line = document.createElement('span');
  const top = 5 + Math.random()*90;
  const width = 120 + Math.random()*220;
  line.style.top = top + '%';
  line.style.left = '-10%';
  line.style.width = width + 'px';
  line.style.animationDelay = (Math.random()*5) + 's';
  line.style.animationDuration = (4.5 + Math.random()*3) + 's';
  sl.appendChild(line);
}
</script>

COMO ATIVAR O RASTREAMENTO PARA O META (FACEBOOK/INSTAGRAM ADS)
=====================================================================
1. Pegue o ID do seu Pixel no Gerenciador de Eventos (Meta Business Suite).
2. Cole o código abaixo dentro do <head>, ANTES de fechar </head>,
   substituindo SEU_PIXEL_ID pelo número do seu pixel:

<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', 'SEU_PIXEL_ID');
  fbq('track', 'PageView');
</script>

3. Com isso, toda vez que alguém clicar em um vendedor, o evento
   "Contact" é enviado automaticamente para o Meta, junto com o nome
   do vendedor e da loja. Você podera ver esses dados no Gerenciador
   de Eventos e usa-los para criar publicos e otimizar campanhas.
=====================================================================
-->

</body>
</html>
